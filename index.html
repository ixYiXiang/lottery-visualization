        ["4",121,0.035,0.0295,0.0055],["5",216,0.0625,0.0617,0.0008],
        ["6",568,0.1643,0.1664,-0.0021],["7",722,0.2089,0.2027,0.0062],
        ["8",1021,0.2953,0.3072,-0.0118],["9",497,0.1438,0.1436,0.0002],
        ["10",270,0.0781,0.077,0.0011]
    ];
    // 钃濈悆濂囧伓
    const blueParityData = [
        ["鍋?,1709,0.4944,0.5,-0.0056],["濂?,1748,0.5056,0.5,0.0056]
    ];
    // 钃濈悆澶у皬
    const blueSizeData = [
        ["澶?,1749,0.5059,0.4997,0.0063],["灏?,1708,0.4941,0.5003,-0.0063]
    ];

    // ========== 琛ㄦ牸濉厖鍑芥暟锛堟坊鍔?positive/negative 绫伙紝纭繚鍋忓樊棰滆壊锛?==========
    function fillTable(tableId, data) {
        const tbody = document.querySelector(`#${tableId} tbody`);
        if (!tbody) return;
        tbody.innerHTML = "";
        data.forEach(row => {
            const dev = row[4];
            const cls = dev >= 0 ? 'positive' : 'negative';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:500;">${row[0]}</td>
                <td>${row[1]}</td>
                <td>${(row[2]*100).toFixed(2)}%</td>
                <td>${(row[3]*100).toFixed(2)}%</td>
                <td class="${cls}">${(dev*100).toFixed(4)}%</td>
            `;
            tbody.appendChild(tr);
        });
    }
    fillTable("t01_sum", sumData);
    fillTable("t02_parity", parityData);
    fillTable("t03_size", sizeData);
    fillTable("t04_ratio", ratioData);
    fillTable("t05_span", spanData);
    fillTable("t06_consecutive", consecutiveData);
    fillTable("t07_ac", acData);
    fillTable("t08_blueparity", blueParityData);
    fillTable("t09_bluesize", blueSizeData);

    // ========== 鍥捐〃鏋勫缓鍑芥暟锛堝己鍒跺瓧鍙枫€佸亸宸孩缁胯壊鎮诞鎻愮ず锛?==========
    function buildChart(containerId, xAxis, dataset, yMax) {
        const dom = document.getElementById(containerId);
        if (!dom) return;
        const chart = echarts.init(dom);
        const actual = dataset.map(r => r[2] * 100);
        const theory = dataset.map(r => r[3] * 100);
        const counts = dataset.map(r => r[1]);
        const devs = dataset.map(r => r[4] * 100);
        chart.setOption({
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: (params) => {
                    const idx = params[0].dataIndex;
                    const devVal = devs[idx];
                    const devSign = devVal >= 0 ? `+${devVal.toFixed(4)}%` : `${devVal.toFixed(4)}%`;
                    const devColor = devVal >= 0 ? '#1f8a3e' : '#cb3b2a';
                    return `<strong style="font-size:15px;">${xAxis[idx]}</strong><br/>
                            <span style="font-size:15px;">馃搳 瀹為檯鍗犳瘮: ${actual[idx].toFixed(2)}%</span><br/>
                            <span style="font-size:15px;">馃搻 鐞嗚鍗犳瘮: ${theory[idx].toFixed(2)}%</span><br/>
                            <span style="font-size:15px;">鈿栵笍 鍋忓樊: <span style="color:${devColor};">${devSign}</span></span><br/>
                            <span style="font-size:15px;">馃幆 瀹為檯娆℃暟: ${counts[idx]}</span>`;
                },
                borderColor: '#d4af37',
                textStyle: { fontSize: 15 }
            },
            legend: {
                textStyle: { fontSize: 15, color: '#aa8233' },
                data: ['瀹為檯鍗犳瘮 (%)', '鐞嗚鍩哄噯绾?],
                left: 'left'
            },
            grid: { containLabel: true, left: '8%', right: '8%', top: '15%', bottom: '10%' },
            xAxis: {
                type: 'category',
                data: xAxis,
                axisLabel: { rotate: xAxis.length > 12 ? 35 : 25, interval: 0, fontSize: 13, color: '#8b6f30' },
                axisLine: { lineStyle: { color: '#c9a53b' } }
            },
            yAxis: {
                type: 'value',
                name: '鍗犳瘮 (%)',
                min: 0,
                max: yMax,
                axisLabel: { fontSize: 14, formatter: '{value}%' },
                nameTextStyle: { fontSize: 15, color: '#b88c3a' }
            },
            series: [
                {
                    name: '瀹為檯鍗犳瘮 (%)',
                    type: 'bar',
                    data: actual,
                    barWidth: '55%',
                    itemStyle: { borderRadius: [8,8,0,0], color: '#F2C94C' }
                },
                {
                    name: '鐞嗚鍩哄噯绾?,
                    type: 'line',
                    data: theory,
                    lineStyle: { color: '#B8860B', width: 2.5, type: 'dashed' },
                    symbol: 'circle',
                    symbolSize: 6
                }
            ]
        });
    }

    // 娓叉煋鎵€鏈夊浘琛?    buildChart("c01_sum", sumData.map(v=>v[0]), sumData, 20);
    buildChart("c02_parity", parityData.map(v=>v[0]), parityData, 38);
    buildChart("c03_size", sizeData.map(v=>v[0]), sizeData, 38);
    buildChart("c04_ratio", ratioData.map(v=>v[0]), ratioData, 18);
    buildChart("c05_span", spanData.map(v=>v[0]), spanData, 25);
    buildChart("c06_consecutive", consecutiveData.map(v=>v[0]), consecutiveData, 55);
    buildChart("c07_ac", acData.map(v=>v[0]), acData, 32);
    buildChart("c08_blueparity", blueParityData.map(v=>v[0]), blueParityData, 55);
    buildChart("c09_bluesize", blueSizeData.map(v=>v[0]), blueSizeData, 55);

    // 绐楀彛鑷€傚簲
    window.addEventListener('resize', () => {
        const ids = ["c01_sum","c02_parity","c03_size","c04_ratio","c05_span","c06_consecutive","c07_ac","c08_blueparity","c09_bluesize"];
        ids.forEach(id => {
            const inst = echarts.getInstanceByDom(document.getElementById(id));
            if (inst) inst.resize();
        });
    });
</script>
</body>
</html>
